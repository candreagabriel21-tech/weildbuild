<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeildBuild has moved!</title>

<link rel="icon" type="image/png" href="logos/weildbuild_logo_old.png">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: radial-gradient(circle at top, #1a0833 0%, #09020f 55%, #040105 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        padding: 30px;
        animation: fadeIn 0.8s ease;
    }

    img {
        width: 320px;
        max-width: 90%;
        margin-bottom: 35px;
        user-select: none;
    }

    h1 {
        font-size: 2.8rem;
        margin-bottom: 18px;
        background: linear-gradient(180deg, #b84dff 0%, #5b1d8f 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    p {
        color: #a0a0a0;
        font-size: 1.1rem;
        margin-bottom: 30px;
    }

    .button {
        display: inline-block;
        background: #8f3dff;
        color: white;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: bold;
        transition: 0.25s ease;
    }

    .button:hover {
        background: #a85cff;
        transform: translateY(-2px);
        box-shadow: 0 0 18px rgba(168, 92, 255, 0.5);
    }

    .button:active {
        transform: translateY(0);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>
</head>

<body>

<div class="container">

    <img src="logos/text_logo_simple.png" alt="WeildBuild Logo">

    <h1>WeildBuild has moved!</h1>

    <p>Check it out here:</p>

    <a class="button" href="https://weildbuild.vercel.app">
        Join WeildBuild
    </a>

</div>

</body>
</html>
