# Render Blueprint for the WeildBuild real-time socket.io server.
# Push this to the root of your GitHub repo, then go to:
# https://dashboard.render.com/blueprints
# Render will detect this file and offer to create the service for you.
#
# This blueprint creates ONLY the socket server (not the Next.js app —
# that stays on Vercel). The socket server lives in socket-server/ and
# runs independently.

services:
  - type: web
    name: weildbuild-socket
    runtime: node
    plan: free
    # CRITICAL: Root Directory must point to socket-server/ so Render
    # uses its package.json (which has the right start script). Otherwise
    # Render picks up the root package.json (the Next.js one) and tries
    # to run `next start` or auto-detects a wrong entry point.
    rootDir: socket-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Replace with your Vercel URL (comma-separated for multiple).
      # Use "*" only for testing — in production, list your actual origins.
      - key: ALLOWED_ORIGINS
        value: "*"
